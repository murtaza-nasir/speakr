<!-- Mobile Tab Navigation (design system v1) — uses the same tabs
     primitive as desktop so the mobile shell shares the same language. -->
<div class="flex-shrink-0">
    <div class="tabs px-2 overflow-x-auto">
        <button @click="mobileTab = 'summary'"
                class="tab"
                :class="{'is-active': mobileTab === 'summary'}">
            <span v-text="t('summary.title')"></span>
        </button>
        <button @click="mobileTab = 'transcript'"
                class="tab"
                :class="{'is-active': mobileTab === 'transcript'}">
            <span v-text="t('transcription.title')"></span>
        </button>
        <button @click="mobileTab = 'notes'"
                class="tab"
                :class="{'is-active': mobileTab === 'notes'}">
            <span v-text="t('notes.title')"></span>
        </button>
        <button @click="mobileTab = 'chat'"
                class="tab"
                :class="{'is-active': mobileTab === 'chat'}">
            <span v-text="t('chat.title')"></span>
        </button>
        <button v-if="selectedRecording.events && selectedRecording.events.length > 0"
                @click="mobileTab = 'events'"
                class="tab"
                :class="{'is-active': mobileTab === 'events'}">
            <i class="fas fa-calendar-alt" style="font-size: 11px;"></i>
            <span v-text="t('events.title')"></span>
            <span class="tab__count">${ selectedRecording.events.length }</span>
        </button>
    </div>
</div>
