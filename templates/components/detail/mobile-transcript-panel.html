<!-- Mobile Transcript Panel. Toolbar consolidated to use the design
     system primitives (.btn .btn--icon .btn--sm, segmented .tabs for
     the simple/bubble view toggle) so it matches the desktop look
     and feel. Previous version used bespoke .copy-btn, .toggle-button,
     .follow-player-control classes that read as a different visual
     language from the rest of the app. -->
<div v-if="mobileTab === 'transcript'" class="h-full flex flex-col">
    <div class="flex items-center justify-between gap-2 flex-shrink-0 px-3 py-2">
        <!-- Follow-player toggle: now a .btn--icon toggle with a
             distinct active state (text-accent + bg-accent) so the
             on/off state reads at a glance. -->
        <button v-if="processedTranscription.isJson && processedTranscription.hasDialogue"
                @click="toggleFollowPlayerMode"
                class="btn btn--icon btn--sm"
                :style="followPlayerMode ? 'color: var(--text-accent); background: var(--bg-accent);' : ''"
                :title="followPlayerMode ? t('tooltips.followPlayerEnabled') : t('tooltips.followPlayerDisabled')">
            <i class="fas fa-arrows-alt-v"></i>
        </button>
        <span v-else></span>

        <div class="flex items-center gap-1">
            <!-- Simple / bubble view toggle as a segmented mini-tabs
                 control. Uses the same .btn--icon visual rhythm but
                 wrapped in a single rounded container so they read
                 as a connected segmented switch. -->
            <div v-if="processedTranscription.hasDialogue"
                 class="inline-flex items-stretch rounded-md p-0.5 mr-1"
                 style="background: var(--bg-tertiary);">
                <button @click="toggleTranscriptionViewMode"
                        class="px-2 py-1 rounded text-xs transition-colors"
                        :style="transcriptionViewMode === 'simple' ? 'background: var(--bg-accent); color: var(--text-accent);' : 'color: var(--text-muted);'"
                        :title="t('tooltips.simpleView') || 'Simple view'">
                    <i class="fas fa-list"></i>
                </button>
                <button @click="toggleTranscriptionViewMode"
                        class="px-2 py-1 rounded text-xs transition-colors"
                        :style="transcriptionViewMode === 'bubble' ? 'background: var(--bg-accent); color: var(--text-accent);' : 'color: var(--text-muted);'"
                        :title="t('tooltips.bubbleView') || 'Bubble view'">
                    <i class="fas fa-comments"></i>
                </button>
            </div>
            <button @click="copyTranscription" class="btn btn--icon btn--sm" :title="t('tooltips.copyTranscript')"><i class="fas fa-copy"></i></button>
            <button @click="downloadTranscript" v-if="selectedRecording && selectedRecording.transcription" class="btn btn--icon btn--sm" :title="t('tooltips.downloadTranscriptWithTemplate')"><i class="fas fa-download"></i></button>
            <button @click="openTranscriptionEditor" v-if="selectedRecording && selectedRecording.transcription" class="btn btn--icon btn--sm" :title="t('tooltips.editTranscript')"><i class="fas fa-edit"></i></button>
        </div>
    </div>
    <div class="flex-grow overflow-y-auto mobile-content-box relative">
        <!-- Floating Processing Indicator (Mobile) -->
        <div v-if="selectedRecording.status === 'PROCESSING'"
             :class="['processing-indicator-floating', processingIndicatorMinimized ? 'minimized' : '']">
            <template v-if="!processingIndicatorMinimized">
                <div class="processing-indicator-content">
                    <i class="fas fa-spinner fa-spin text-[var(--text-accent)]"></i>
                    <span class="text-sm text-[var(--text-secondary)]" v-text="t('help.processingTranscription')"></span>
                </div>
                <button @click="processingIndicatorMinimized = true"
                        class="processing-indicator-minimize"
                        :title="t('tooltips.minimize')">
                    <i class="fas fa-chevron-up"></i>
                </button>
            </template>
            <template v-else>
                <button @click="processingIndicatorMinimized = false"
                        class="processing-indicator-expand"
                        :title="t('help.processingTranscription')">
                    <i class="fas fa-spinner fa-spin"></i>
                </button>
            </template>
        </div>

        <!-- No transcription state (only show if not processing and no transcription) -->
        <div v-if="!selectedRecording.transcription && selectedRecording.status !== 'PROCESSING'" class="text-center py-8">
            <i class="fas fa-file-text text-3xl text-[var(--text-muted)] mb-3"></i>
            <p class="text-[var(--text-muted)]" v-text="t('transcription.noTranscription')"></p>
        </div>

        <!-- Error Display (when transcription is an error message) -->
        <div v-if="processedTranscription.isError" class="error-display-container p-2">
            <div :class="[
                'rounded-lg p-4 border',
                processedTranscription.error.type === 'size_limit' ? 'bg-amber-500/10 border-amber-500/30' :
                processedTranscription.error.type === 'timeout' ? 'bg-orange-500/10 border-orange-500/30' :
                processedTranscription.error.type === 'auth' ? 'bg-red-500/10 border-red-500/30' :
                'bg-gray-500/10 border-gray-500/30'
            ]">
                <div class="flex items-start gap-3">
                    <div :class="[
                        'flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center',
                        processedTranscription.error.type === 'size_limit' ? 'bg-amber-500/20' :
                        processedTranscription.error.type === 'timeout' ? 'bg-orange-500/20' :
                        processedTranscription.error.type === 'auth' ? 'bg-red-500/20' :
                        'bg-gray-500/20'
                    ]">
                        <i :class="[
                            'fas',
                            processedTranscription.error.icon,
                            processedTranscription.error.type === 'size_limit' ? 'text-amber-500' :
                            processedTranscription.error.type === 'timeout' ? 'text-orange-500' :
                            processedTranscription.error.type === 'auth' ? 'text-red-500' :
                            'text-gray-500'
                        ]"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-semibold text-[var(--text-primary)] mb-1">
                            ${processedTranscription.error.title}
                        </h3>
                        <p class="text-sm text-[var(--text-secondary)] mb-2">
                            ${processedTranscription.error.message}
                        </p>
                        <div v-if="processedTranscription.error.guidance" class="text-xs text-[var(--text-muted)] bg-[var(--bg-tertiary)]/50 rounded p-2">
                            <i class="fas fa-lightbulb text-yellow-500 mr-1"></i>
                            ${processedTranscription.error.guidance}
                        </div>
                    </div>
                </div>
                <div class="mt-3 pt-3 border-t border-[var(--border-secondary)]">
                    <button @click="reprocessTranscription(selectedRecording.id)"
                            v-if="selectedRecording.can_edit !== false"
                            class="btn btn--primary w-full">
                        <i class="fas fa-redo-alt"></i>
                        <span>Reprocess</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Transcription content (show regardless of processing state if transcription exists) -->
        <div v-if="selectedRecording.transcription && !processedTranscription.isError">
            <!-- Speaker-run layout: consecutive same-speaker segments
                 grouped under one .speaker-run so the speaker pill at
                 the top of the run can stay sticky for the WHOLE run.
                 Was iterating over the flat simpleSegments before,
                 which meant each segment was its own sticky scope and
                 the pill disappeared as soon as the first segment
                 scrolled past — the "sticky pills don't work" symptom. -->
            <div v-if="!processedTranscription.hasDialogue || transcriptionViewMode === 'simple'" class="transcription-simple-view">
                <div v-if="processedTranscription.hasDialogue">
                    <div v-for="(run, runIndex) in processedTranscription.simpleSegmentRuns"
                         :key="`run-${runIndex}-${run.startTime}`"
                         class="speaker-run">
                        <div v-if="showTimestampsSimpleView"
                             :class="['speaker-tablet-group', run.color]">
                            <span class="speaker-tablet-time">${ formatTimestamp(run.startTime) }</span>
                            <span class="speaker-tablet-name">${run.speaker}</span>
                        </div>
                        <div v-else :class="['speaker-tablet', run.color]">${run.speaker}</div>
                        <div v-for="(segment, segIndex) in run.segments"
                             :key="`seg-${segment.originalIndex}-${segment.startTime}`"
                             :class="['speaker-segment', { 'active-playing-segment': currentPlayingSegmentIndex === segment.originalIndex }]"
                             @click="seekAudioFromEvent"
                             @dblclick.stop="openAsrEditorAtSegment(segment.originalIndex)"
                             :data-start-time="segment.startTime"
                             :data-segment-index="segment.originalIndex">
                            <div class="speaker-text">${segment.sentence}</div>
                        </div>
                    </div>
                </div>
                <div v-else>
                    <div v-if="processedTranscription.simpleSegments && processedTranscription.simpleSegments.length > 0">
                        <div v-for="(segment, index) in processedTranscription.simpleSegments" :key="`seg-${index}-${segment.startTime}`" :class="['transcript-segment cursor-pointer hover:bg-[var(--bg-accent-hover)] p-2 rounded transition-colors', { 'active-playing-segment': currentPlayingSegmentIndex === index }]" @click="seekAudioFromEvent" @dblclick.stop="openAsrEditorAtSegment(index)" :data-start-time="segment.startTime" :data-segment-index="index"><span v-if="showTimestampsSimpleView" class="speaker-segment-timestamp speaker-segment-timestamp--inline">${ formatTimestamp(segment.startTime) }</span>${segment.sentence}</div>
                    </div>
                    <div v-else class="whitespace-pre-wrap">${processedTranscription.content}</div>
                </div>
            </div>
            <div v-else-if="transcriptionViewMode === 'bubble'" class="transcription-with-speakers">
                <template v-for="(row, rowIndex) in processedTranscription.bubbleRows" :key="`${selectedRecording.id}-bubble-row-${rowIndex}`">
                    <div :class="['bubble-row', row.isMe ? 'speaker-me' : '']">
                        <div v-for="(bubble, bubbleIndex) in row.bubbles" :key="`bubble-${rowIndex}-${bubbleIndex}-${bubble.startTime}`" :class="['speaker-bubble', bubble.color, row.isMe ? 'speaker-me' : '', { 'active-playing-segment': currentPlayingSegmentIndex === getBubbleGlobalIndex(rowIndex, bubbleIndex) }]" @click="seekAudioFromEvent" :data-start-time="bubble.startTime" :data-segment-index="getBubbleGlobalIndex(rowIndex, bubbleIndex)">
                            <div class="speaker-bubble-content">${bubble.sentence}</div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>
