<!-- Desktop Notes Tab (design system v1).
     Per-tab actions live in the right-rail tab-bar; in-place edit. -->
<div v-if="selectedTab === 'notes'" class="h-full px-4 py-4 overflow-y-auto">
    <!-- Reading mode -->
    <div v-if="!editingNotes" class="prose-flush h-full" @click="clickToEditNotes">
        <div v-if="selectedRecording.notes_html"
             v-html="selectedRecording.notes_html">
        </div>
        <div v-else-if="selectedRecording.notes" class="whitespace-pre-wrap">
            ${selectedRecording.notes}
        </div>
        <div v-else class="empty">
            <div class="empty__icon"><i class="fas fa-pen"></i></div>
            <div class="empty__title" v-text="t('help.clickToAddNotes')"></div>
            <div class="empty__body t-meta">Markdown is supported.</div>
        </div>
    </div>

    <!-- Editing mode -->
    <div v-else class="h-full flex flex-col">
        <textarea ref="notesMarkdownEditor"
                  v-model="selectedRecording.notes"
                  class="field flex-1"
                  style="resize: none; min-height: 0; padding: var(--sp-4);"
                  :placeholder="t('form.enterNotesMarkdown')">
        </textarea>
        <div class="t-meta" style="margin-top: var(--sp-2);">
            <i class="fas fa-circle" style="font-size: 6px; color: var(--text-accent); margin-right: var(--sp-1);"></i>
            <span>Editing — save from the tab bar above</span>
        </div>
    </div>
</div>
