<!-- Desktop Summary Tab (design system v1).
     No per-tab action buttons here — they live in the right-rail's
     tab-bar action toolbar so editing transitions in-place. -->
<div v-if="selectedTab === 'summary'" class="h-full px-4 py-4 overflow-y-auto">
    <!-- In progress -->
    <div v-if="selectedRecording.status === 'SUMMARIZING'" class="empty">
        <div class="spinner spinner--lg"></div>
        <div class="empty__title" v-text="t('summary.summaryInProgress')"></div>
    </div>

    <!-- Empty state -->
    <div v-else-if="!selectedRecording.summary" class="empty">
        <div class="empty__icon"><i class="fas fa-file-alt"></i></div>
        <div class="empty__title" v-text="t('summary.noSummary')"></div>
        <div v-if="processedTranscription.isError" class="banner banner--warn" style="margin-top: var(--sp-2);">
            <i class="fas fa-exclamation-triangle"></i>
            <span>Cannot generate summary: transcription failed</span>
        </div>
        <div class="flex items-center gap-2" style="margin-top: var(--sp-3);">
            <button class="btn btn--primary"
                    @click="generateSummary()"
                    :disabled="processedTranscription.isError">
                <i class="fas fa-magic"></i>
                <span>${ t('summary.generateSummary') }</span>
            </button>
            <button v-if="!processedTranscription.isError"
                    class="btn btn--ghost btn--icon"
                    @click="openCustomizeSummaryModal"
                    :title="t('summary.customizePrompt') || 'Customise prompt'">
                <i class="fas fa-sliders-h"></i>
            </button>
        </div>
    </div>

    <!-- Reading mode -->
    <div v-else-if="!editingSummary"
         class="prose-flush"
         v-html="selectedRecording.summary_html || selectedRecording.summary">
    </div>

    <!-- Editing mode (in-place; Cancel/Save live in the tab-bar action slot) -->
    <div v-else class="h-full flex flex-col">
        <textarea ref="summaryMarkdownEditor"
                  v-model="selectedRecording.summary"
                  class="field flex-1"
                  style="resize: none; min-height: 0; padding: var(--sp-4);"
                  :placeholder="t('form.enterSummaryMarkdown')">
        </textarea>
        <div class="t-meta" style="margin-top: var(--sp-2);">
            <i class="fas fa-circle" style="font-size: 6px; color: var(--text-accent); margin-right: var(--sp-1);"></i>
            <span>Editing — save from the tab bar above</span>
        </div>
    </div>
</div>
