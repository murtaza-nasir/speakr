<!-- Mobile Summary Panel (design system v1) -->
<div v-if="mobileTab === 'summary'" class="h-full flex flex-col">
    <!-- Action toolbar -->
    <div class="flex items-center justify-end gap-1 flex-shrink-0 px-3 py-2">
        <button v-if="selectedRecording.summary" @click="copySummary" class="btn btn--icon" :title="t('buttons.copySummary')"><i class="fas fa-copy"></i></button>
        <button v-if="selectedRecording.summary" @click="downloadSummary" class="btn btn--icon" :title="t('buttons.downloadAsWord')"><i class="fas fa-download"></i></button>
        <button @click="toggleEditSummary" class="btn btn--icon" :title="t('buttons.editSummary')"><i class="fas fa-pen"></i></button>
    </div>
    <div class="flex-grow overflow-y-auto px-3 pb-3">
        <div v-if="editingSummary" class="h-full flex flex-col">
            <textarea ref="summaryMarkdownEditor"
                      v-model="selectedRecording.summary"
                      class="field flex-1"
                      style="resize: none; padding: var(--sp-3);"></textarea>
            <div class="flex justify-end gap-2 mt-2">
                <button @click="cancelEditSummary" class="btn btn--sm btn--ghost" v-text="t('common.cancel')"></button>
                <button @click="saveEditSummary" class="btn btn--sm btn--primary" v-text="t('common.save')"></button>
            </div>
        </div>
        <div v-else>
            <div v-if="selectedRecording.status === 'SUMMARIZING'" class="empty">
                <div class="spinner spinner--lg"></div>
                <div class="empty__title" v-text="t('help.generatingSummary')"></div>
            </div>
            <div v-else-if="!selectedRecording.summary" class="empty">
                <div class="empty__icon"><i class="fas fa-file-alt"></i></div>
                <div class="empty__title" v-text="t('summary.noSummary')"></div>
                <div v-if="processedTranscription.isError" class="banner banner--warn">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Cannot generate summary: transcription failed</span>
                </div>
                <div class="flex items-center gap-2" style="margin-top: var(--sp-3);">
                    <button class="btn btn--primary"
                            @click="generateSummary()"
                            :disabled="processedTranscription.isError">
                        <i class="fas fa-magic"></i>
                        <span>Generate Summary</span>
                    </button>
                    <button v-if="!processedTranscription.isError"
                            class="btn btn--ghost btn--icon"
                            @click="openCustomizeSummaryModal"
                            title="Customise prompt">
                        <i class="fas fa-sliders-h"></i>
                    </button>
                </div>
            </div>
            <div v-else class="prose-flush h-full" v-html="selectedRecording.summary_html || selectedRecording.summary"></div>
        </div>
    </div>
</div>
