<!-- Mobile Notes Panel (design system v1) -->
<div v-if="mobileTab === 'notes'" class="h-full flex flex-col">
    <div class="flex items-center justify-end gap-1 flex-shrink-0 px-3 py-2">
        <button v-if="selectedRecording.notes" @click="copyNotes" class="btn btn--icon" :title="t('buttons.copyNotes')"><i class="fas fa-copy"></i></button>
        <button v-if="selectedRecording.notes" @click="downloadNotes" class="btn btn--icon" :title="t('buttons.downloadAsWord')"><i class="fas fa-download"></i></button>
        <button @click="toggleEditNotes" class="btn btn--icon" :title="t('buttons.editNotes')"><i class="fas fa-pen"></i></button>
    </div>
    <div class="flex-grow overflow-y-auto px-3 pb-3">
        <div v-if="editingNotes" class="h-full flex flex-col">
            <!-- See mobile-summary-panel.html for the rationale behind
                 the .markdown-editor-container wrapper. -->
            <div class="markdown-editor-container flex-1 min-h-0 flex flex-col">
                <textarea ref="notesMarkdownEditor"
                          v-model="selectedRecording.notes"></textarea>
            </div>
            <div class="flex justify-end gap-2 mt-2">
                <button @click="cancelEditNotes" class="btn btn--sm btn--ghost" v-text="t('common.cancel')"></button>
                <button @click="saveEditNotes" class="btn btn--sm btn--primary" v-text="t('common.save')"></button>
            </div>
        </div>
        <div v-else @click="clickToEditNotes">
            <div v-if="!selectedRecording.notes" class="empty">
                <div class="empty__icon"><i class="fas fa-sticky-note"></i></div>
                <div class="empty__title" v-text="t('help.clickToAddNotes')"></div>
                <div class="empty__body">Markdown supported.</div>
            </div>
            <div v-else class="prose-flush h-full" v-html="selectedRecording.notes_html || selectedRecording.notes"></div>
        </div>
    </div>
</div>
